name: Deploy to GitHub Pages

# Publishes the repo root to the gh-pages branch, which GitHub Pages serves.
# (Branch-based deploy — the workflow token can't enable Pages itself, but
# GitHub auto-enables Pages for repos with a gh-pages branch.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
